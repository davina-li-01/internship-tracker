<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InternTrack — Contact Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="contact">
<script>if(localStorage.getItem('interntrack_theme')==='dark')document.body.classList.add('dark');</script>

  <div class="app-layout">

    <!-- ── Sidebar ───────────────────────────────────── -->
    <aside class="sidebar">
      <button id="sidebarToggleBtn" class="sidebar-toggle" type="button" title="Toggle sidebar">☰</button>
      <div class="sidebar-brand">InternTrack</div>

      <nav class="sidebar-nav">
        <a href="index.html" class="s-link">Workspace</a>
        <a href="network.html" class="s-link active">Networking</a>
        <a href="files.html" class="s-link">Files</a>
      </nav>

      <div class="sidebar-footer">
        <button id="themeToggle" class="s-btn" type="button">Dark Mode</button>
        <button id="signOutBtn" class="s-btn" type="button">Sign Out</button>
      </div>
    </aside>

    <!-- ── Main Scroll ───────────────────────────────── -->
    <div class="main-scroll">
      <div class="contact-content">
        <section id="contactPageContent">
          <div class="card">
            <p class="muted">Loading contact…</p>
          </div>
        </section>
      </div>
    </div>

    <nav class="mobile-bottom-nav" aria-label="Primary">
      <a href="index.html" class="s-link">Workspace</a>
      <a href="network.html" class="s-link active">Networking</a>
      <a href="files.html" class="s-link">Files</a>
    </nav>

  </div><!-- /.app-layout -->

  <script type="module" src="js/main.js"></script>
</body>
</html>
