<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InternTrack — Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="workspace">

  <div class="app-layout">

    <!-- ── Sidebar ───────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-brand">InternTrack</div>

      <p class="sidebar-label">Internships</p>
      <ul id="internshipList" class="intern-list"></ul>

      <!-- Inline add / edit form -->
      <form id="internshipForm" class="intern-inline-form hidden" autocomplete="off">
        <input type="hidden" id="internshipEditId" />
        <div class="field-group" style="margin:0 0 0.4rem">
          <label for="internshipName">Name <span class="required">*</span></label>
          <input type="text" id="internshipName" placeholder="e.g. Meta SWE Internship" required />
        </div>
        <div class="field-group" style="margin:0 0 0.4rem">
          <label for="internshipCompany">Company</label>
          <input type="text" id="internshipCompany" placeholder="e.g. Meta" />
        </div>
        <div class="field-group" style="margin:0 0 0.4rem">
          <label for="internshipStart">Start date</label>
          <input type="date" id="internshipStart" />
        </div>
        <div class="field-group" style="margin:0 0 0.5rem">
          <label for="internshipEnd">End date</label>
          <input type="date" id="internshipEnd" />
        </div>
        <p id="internshipError" class="error" style="font-size:0.72rem;margin:0 0 0.3rem"></p>
        <div style="display:flex;gap:0.35rem">
          <button type="submit" class="sidebar-save-btn">Save</button>
          <button type="button" id="internshipCancelBtn" class="sidebar-cancel-btn">Cancel</button>
        </div>
      </form>

      <button id="addInternshipBtn" class="sidebar-add-btn" type="button">+ New Internship</button>

      <nav class="sidebar-nav">
        <a href="index.html" class="s-link active">Workspace</a>
        <a href="network.html" class="s-link">Networking</a>
      </nav>

      <div class="sidebar-footer">
        <button id="themeToggle" class="s-btn" type="button">Dark Mode</button>
        <button id="signOutBtn" class="s-btn" type="button">Sign Out</button>
      </div>
    </aside>

    <!-- ── Main Scroll ───────────────────────────────── -->
    <div class="main-scroll">
      <div class="workspace-content">

        <!-- Page header -->
        <div>
          <h1 class="page-heading">Workspace</h1>
          <p class="page-subheading">Log your work, track progress, and generate weekly updates.</p>
        </div>

        <!-- Log Composer -->
        <div class="card log-composer">
          <form id="logForm" autocomplete="off">
            <textarea
              id="logTask"
              rows="2"
              placeholder="What did you work on today?"
              required
            ></textarea>

            <div class="log-details">
              <div class="log-details-row">
                <div class="field-group" style="margin:0">
                  <label for="logDate">Date</label>
                  <input type="date" id="logDate" />
                </div>
                <div class="field-group" style="margin:0">
                  <label for="logImpact">Impact <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
                  <input type="text" id="logImpact" placeholder="What was the outcome?" />
                </div>
              </div>
              <div class="log-details-row">
                <div class="field-group" style="margin:0">
                  <label for="logSkills">Skills <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
                  <input type="text" id="logSkills" placeholder="Python, communication…" />
                </div>
                <div class="field-group" style="margin:0">
                  <label for="logTags">Tags <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
                  <input type="text" id="logTags" placeholder="project-x, design…" />
                </div>
              </div>
            </div>
            <div class="field-group" style="margin:0.5rem 0 0">
              <label for="logBlockers">Questions / Blockers <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
              <input type="text" id="logBlockers" placeholder="Any blockers or open questions?" />
            </div>

            <div class="log-actions">
              <p id="logError" class="error" style="margin:0"></p>
              <button type="submit" class="btn">Log it →</button>
            </div>
          </form>
        </div>

        <!-- Timeline -->
        <div id="timelineContainer"></div>

        <!-- Weekly Update -->
        <div class="card summary-card">
          <div class="summary-header">
            <h2>Weekly Update</h2>
            <div class="summary-actions">
              <button id="generateSummaryBtn" class="btn" type="button">Generate</button>
              <button id="copySummaryBtn" class="btn btn-secondary" type="button">Copy</button>
            </div>
          </div>

          <div class="two-col">
            <div class="field-group">
              <label for="managerName">To (manager)</label>
              <input type="text" id="managerName" placeholder="Manager's name" />
            </div>
            <div class="field-group">
              <label for="yourName">From (you)</label>
              <input type="text" id="yourName" placeholder="Your name" />
            </div>
          </div>

          <div class="field-group">
            <label for="nextSteps">Next steps / plans</label>
            <input type="text" id="nextSteps" placeholder="What are you working on next?" />
          </div>

          <p id="summaryMessage" class="muted" style="font-size:0.82rem;margin-bottom:0.5rem"></p>
          <textarea id="generatedSummary" rows="10" readonly placeholder="Your weekly update will appear here…"></textarea>
        </div>

        <!-- Follow-up Reminders -->
        <div class="card reminders-section">
          <h2>Reminders</h2>
          <ul id="dashboardFollowUps" class="list"></ul>
        </div>

      </div>
    </div>

  </div><!-- /.app-layout -->

  <script type="module" src="app.js"></script>
</body>
</html>
