<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InternTrack | Networking Tracker</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="app.js"></script>
  </head>
  <body data-page="network">
    <header class="site-header">
      <div class="container nav-wrap">
        <h1 class="brand">InternTrack</h1>
        <nav class="nav" aria-label="Main navigation">
          <a href="index.html" class="nav-link">Dashboard</a>
          <a href="network.html" class="nav-link active">Networking</a>
          <a href="summary.html" class="nav-link">Weekly Summary</a>
        </nav>
        <button id="themeToggle" class="btn btn-secondary" type="button">🌙 Dark</button>
      </div>
    </header>

    <main class="container app-shell">
      <aside class="card internship-panel">
        <h2>Internships</h2>
        <p class="muted">Switch between current and past internships.</p>

        <div class="field-group">
          <label for="internshipSelect">Active Internship</label>
          <select id="internshipSelect"></select>
        </div>

        <ul id="internshipList" class="list compact-list"></ul>

        <button id="addInternshipBtn" class="btn btn-secondary" type="button">+ New Internship</button>
        <p id="internshipError" class="error" aria-live="polite"></p>
      </aside>

      <section class="main-content single-col">
        <section class="card">
          <h2>Reminders &amp; Follow-ups</h2>
          <ul id="networkFollowUps" class="list"></ul>
        </section>

        <section class="card">
          <h2>Add Networking Contact</h2>
          <form id="contactForm" novalidate>
            <div class="two-col">
              <div class="field-group">
                <label for="contactName">Name</label>
                <input id="contactName" type="text" required />
              </div>
              <div class="field-group">
                <label for="contactEmail">Email</label>
                <input id="contactEmail" type="email" required />
              </div>
            </div>
            <div class="two-col">
              <div class="field-group">
                <label for="contactRole">Role</label>
                <input id="contactRole" type="text" placeholder="Software Engineer" />
              </div>
              <div class="field-group">
                <label for="dateMet">Date Met</label>
                <input id="dateMet" type="date" required />
              </div>
            </div>
            <div class="two-col">
              <div class="field-group">
                <label for="lastContacted">Last Contacted</label>
                <input id="lastContacted" type="date" />
              </div>
              <div class="field-group">
                <label for="followUpFrequency">Stay in touch frequency</label>
                <select id="followUpFrequency">
                  <option value="monthly">Monthly</option>
                  <option value="bimonthly">Every 2 months</option>
                  <option value="quarterly">Quarterly</option>
                  <option value="none">No reminders</option>
                </select>
              </div>
            </div>
            <div class="field-group">
              <label for="interests">Interests</label>
              <input id="interests" type="text" placeholder="AI, product, front-end" />
            </div>
            <div class="field-group">
              <label for="adviceGiven">Advice Given</label>
              <textarea id="adviceGiven" rows="2"></textarea>
            </div>
            <div class="field-group">
              <label for="contactNotes">Notes</label>
              <textarea id="contactNotes" rows="3"></textarea>
            </div>
            <p id="contactError" class="error" aria-live="polite"></p>
            <button class="btn" type="submit">Save Contact</button>
          </form>
        </section>

        <section class="card">
          <h2>Contact List</h2>
          <ul id="contactList" class="list"></ul>
        </section>
      </section>
    </main>
  </body>
</html>
