<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InternTrack — Networking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="network">

  <div class="app-layout">

    <!-- ── Sidebar ───────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-brand">InternTrack</div>

      <nav class="sidebar-nav">
        <a href="index.html" class="s-link">Workspace</a>
        <a href="network.html" class="s-link active">Networking</a>
      </nav>

      <div class="sidebar-footer">
        <button id="themeToggle" class="s-btn" type="button">Dark Mode</button>
        <button id="signOutBtn" class="s-btn" type="button">Sign Out</button>
      </div>
    </aside>

    <!-- ── Main Scroll ───────────────────────────────── -->
    <div class="main-scroll">
      <div class="network-content">

        <!-- Left: Add contact + contacts list -->
        <div class="network-left">

          <div class="card">
            <h2>Add Contact</h2>
            <form id="contactForm" autocomplete="off">

              <div class="two-col">
                <div class="field-group">
                  <label for="contactName">Name <span class="required">*</span></label>
                  <input type="text" id="contactName" placeholder="Full name" required />
                </div>
                <div class="field-group">
                  <label for="contactRole">Role / Title</label>
                  <input type="text" id="contactRole" placeholder="Software Engineer" />
                </div>
              </div>

              <div class="two-col">
                <div class="field-group">
                  <label for="contactCompany">Company <span class="required">*</span></label>
                  <input type="text" id="contactCompany" placeholder="Company name" required />
                </div>
                <div class="field-group">
                  <label for="contactEmail">Email <span class="required">*</span></label>
                  <input type="email" id="contactEmail" placeholder="email@example.com" required />
                </div>
              </div>

              <div class="two-col">
                <div class="field-group">
                  <label for="dateMet">Last met <span class="required">*</span></label>
                  <input type="date" id="dateMet" required />
                </div>
                <div class="field-group">
                  <label for="followUpFrequency">Follow-up reminder</label>
                  <select id="followUpFrequency">
                    <option value="none">No reminders</option>
                    <option value="weekly">Weekly</option>
                    <option value="biweekly">Every 2 weeks</option>
                    <option value="monthly" selected>Monthly</option>
                    <option value="quarterly">Quarterly</option>
                  </select>
                </div>
              </div>

              <div class="field-group">
                <label for="contactNotes">Notes</label>
                <textarea id="contactNotes" rows="2" placeholder="How you met, key topics, advice given…"></textarea>
              </div>

              <p id="contactError" class="error"></p>
              <div class="row">
                <button type="submit" class="btn">Add Contact</button>
              </div>
            </form>
          </div>

          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:0.75rem;margin-bottom:0.85rem;flex-wrap:wrap">
              <h2 style="margin:0">Your Network</h2>
              <input
                type="search"
                id="contactFilter"
                placeholder="Filter by name, role, company…"
                style="flex:1;min-width:160px;max-width:260px;padding:0.42rem 0.75rem;font-size:0.82rem"
              />
            </div>
            <ul id="contactList" class="list"></ul>
          </div>

        </div><!-- /.network-left -->

        <!-- Right: Reminders + weekly connections -->
        <div class="network-right">

          <div class="card">
            <h2>Upcoming Reminders</h2>
            <ul id="networkFollowUps" class="list"></ul>
          </div>

          <div class="card">
            <h2>Weekly Connections</h2>
            <div id="weeklyConnections"></div>
          </div>

        </div><!-- /.network-right -->

      </div>
    </div>

  </div><!-- /.app-layout -->

  <script type="module" src="app.js"></script>
</body>
</html>
